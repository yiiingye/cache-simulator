<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Cache Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="light">

    <header>
        <h1>Cache Simulator</h1>

        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
            <span class="label-text">Dark Mode</span>
        </label>
    </header>

    <div class="layout">

        <div class="panel">
            <label>Cache Type</label>
            <select id="cacheType">
                <option value="FA">Fully Associative</option>
                <option value="DM">Direct Mapped</option>
                <option value="2W">2-Way Set Associative</option>
            </select>

            <label for="policy">Replacement Policy</label>
            <select id="policy">
                <option value="LRU">LRU</option>
                <option value="FIFO">FIFO</option>
                <option value="RANDOM">Random</option>
            </select>

            <label>Access Pattern</label>
            <select id="pattern">
                <option value="Random">Random</option>
                <option value="Sequential">Sequential</option>
                <option value="4Strike">4Strike</option>
                <option value="ConflictDM">ConflictDM</option>
                <option value="WorkingSet64">WorkingSet64</option>
                <option value="StrideConflict">StrideConflict</option>
            </select>

            <label>Number of Accesses</label>
            <input id="numAccesses" type="number" value="200000" style="width: 800px;">

            <button onclick="runSimulation()">Run Simulation</button>
        </div>

        <div class="chart-container" id="chartContainer">
            <canvas id="chart"></canvas>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
